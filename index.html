<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Dashboard Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1 class="main-title">JavaScript API Dashboard</h1>
  <div class="grid-container">
    <section class="grid-item" id="dog-api">
      <h2>🐶 Random Dog</h2>
      <button onclick="getDogImage()">Get Dog</button>
      <div class="output" id="dog-output"></div>
    </section>

    <section class="grid-item" id="cat-api">
      <h2>🐱 Random Cat</h2>
      <button onclick="getCatImage()">Get Cat</button>
      <div class="output" id="cat-output"></div>
    </section>

    <section class="grid-item" id="weather-api">
      <h2>☀️ Weather Info</h2>
      <button onclick="getWeather()">Get Weather</button>
      <div class="output" id="weather-output"></div>
    </section>

    <section class="grid-item" id="currency-api">
      <h2>💱 Currency Rates</h2>
      <button onclick="getExchangeRates()">Get Rates</button>
      <div class="output" id="currency-output"></div>
    </section>

    <section class="grid-item" id="pokemon-api">
      <h2>🎮 Pokemon Sprite</h2>
      <button onclick="getPokemon()">Get Pokemon</button>
      <div class="output" id="pokemon-output"></div>
    </section>

    <section class="grid-item" id="randomfact-api">
      <h2>🧑‍💻 Random Facts</h2>
      <button onclick="getRandomFact()">Get Fact</button>
      <div class="output" id="randomfact-output"></div>
    </section>

    <section class="grid-item" id="joke-api">
      <h2>🤣 Random Joke</h2>
      <button type="button" onclick="getJoke()">Get Joke</button>
      <div class="output" id="joke-output"></div>
    </section>

    <section class="grid-item" id="fox-api">
      <h2>🦊 Random Fox</h2>
      <button type="button" onclick="getFoxImage()">Get Fox</button>
      <div class="output" id="fox-output"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
